<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archbishop Library — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a3c6e;
      --navy-dark: #0f2847;
      --gold: #c9a84c;
      --gold-light: #d4b96a;
      --white: #ffffff;
      --grey-light: #f4f4f4;
      --grey: #e0e0e0;
      --text: #333333;
      --text-muted: #777777;
      --danger: #c0392b;
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body: 'Lora', 'Times New Roman', serif;
    }

    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 50%, #2a5298 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .login-wrapper {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .login-card {
      background: var(--white);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 48px 40px;
      text-align: center;
      animation: fadeInUp 0.6s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card .crest {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: var(--navy);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      font-family: var(--font-heading);
      font-size: 32px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(26, 60, 110, 0.3);
    }

    .login-card h1 {
      font-family: var(--font-heading);
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .login-card .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      font-family: var(--font-body);
      font-size: 15px;
      border: 2px solid var(--grey);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--grey-light);
    }

    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
      background: var(--white);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
      background: var(--navy);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.5px;
      margin-top: 8px;
    }

    .btn-login:hover {
      background: var(--navy-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(26, 60, 110, 0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: #fef2f2;
      color: var(--danger);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 16px;
      display: none;
      border: 1px solid #fecaca;
    }

    .error-msg.visible {
      display: block;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .footer-text {
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="crest">✝</div>
      <h1>Archbishop Library</h1>
      <p class="subtitle">Content Management System</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      </form>

      <p class="footer-text">Archbishop Valerian Okeke &middot; Administrative Portal</p>
    </div>
  </div>

  <script>
    /* Redirect if already logged in */
    if (localStorage.getItem('ab_token')) {
      window.location.href = 'dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('visible');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('ab_token', data.data.token);
          localStorage.setItem('ab_username', data.data.username);
          window.location.href = 'dashboard.html';
        } else {
          showError(data.message || 'Login failed.');
        }
      } catch (err) {
        showError('Unable to connect to the server. Please try again.');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }
  </script>
</body>
</html>
